<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}Firma Digital iaMODE{% endblock %}</title>

    <meta property="og:type" content="website">
    <meta property="og:title" content="{{ og_title | default('Firma Digital iaMODE') }}">
    <meta property="og:description" content="{{ og_description | default('Documento disponible para firma digital segura.') }}">
    <meta property="og:image" content="{{ og_image | default('https://blogger.googleusercontent.com/img/a/AVvXsEjg4cIM8FSFk6oaQXXxfyjYXNsfWoUrkb8rIOkZl1ZUggLgYt8EVt3HukH7CZyrz3uEFMiJo-I80y0wvUGW4J4wA7apFKa2KcNgZnaBXmd4EjzUYf2KGkaY0kdqPCeZJNPyzbjZR_YhuRYVU2XWQbhE4_G1pXzVlvjU-MCp0_PuTBSHivotL3kuosqReq0') }}">
    <meta property="og:url" content="{{ request.url }}">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ og_title | default('Firma Digital iaMODE') }}">
    <meta name="twitter:description" content="{{ og_description | default('Documento disponible para firma digital segura.') }}">
    <meta name="twitter:image" content="{{ og_image | default('https://blogger.googleusercontent.com/img/a/AVvXsEjg4cIM8FSFk6oaQXXxfyjYXNsfWoUrkb8rIOkZl1ZUggLgYt8EVt3HukH7CZyrz3uEFMiJo-I80y0wvUGW4J4wA7apFKa2KcNgZnaBXmd4EjzUYf2KGkaY0kdqPCeZJNPyzbjZR_YhuRYVU2XWQbhE4_G1pXzVlvjU-MCp0_PuTBSHivotL3kuosqReq0') }}">

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/styles.css') }}"
    >

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet"
    >
</head>

<body>

    <div class="app-container">

        <header class="topbar">

            <div class="brand">
                <span class="brand-logo">✍️</span>
                <span class="brand-text">Firma Digital iaMODE</span>
            </div>

            <div class="topbar-actions">
                {% block topbar_actions %}{% endblock %}
            </div>

        </header>

        <main class="main-content">
            {% block content %}{% endblock %}
        </main>

    </div>

    {% block scripts %}{% endblock %}

</body>
</html>
